name: CI Build
on: [push, pull_request]

jobs:
  flatpak:
    name: "Flatpak Build"
    runs-on: ubuntu-latest
    container:
      # Use a container that has the flatpak-builder tools pre-installed
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-50
      options: --privileged
    steps:
      - uses: actions/checkout@v4

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: LiveCaptions.flatpak
          branch: stable
          manifest-path: net.sapples.LiveCaptions.json
          cache: true
